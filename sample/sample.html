<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Cast Browser Test</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fa;
        color: #15191e;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 42px 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }

      p {
        margin: 0 0 22px;
        color: #4d5a64;
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #0f1317;
        border-radius: 8px;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Smoke video page</h1>
      <p>This page uses a public MP4 file for detection and cast smoke checks.</p>
      <video
        controls
        poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg"
      >
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
      </video>
    </main>
  </body>
</html>
