name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac
            os: macos-latest
            script: dist:mac
          - name: windows
            os: windows-latest
            script: dist:win
          - name: linux
            os: ubuntu-latest
            script: dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run ${{ matrix.script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: movie-cast-browser-${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Write release notes
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          Movie Cast Browser desktop release.

          Included platforms:
          - macOS DMG and ZIP for Intel and Apple Silicon
          - Windows installer and ZIP for x64
          - Linux AppImage, DEB, and tar.gz for x64

          Main capabilities:
          - Detect direct video URLs from web pages
          - Cast media to Chromecast without screen mirroring
          - Preview detected links in app
          - Control TV playback, seek, volume, mute, stop, and queue
          - Detect and cast detached subtitles when the TV can fetch them
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*
            SHA256SUMS.txt
